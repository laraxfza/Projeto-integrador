<!DOCTYPE html>
<html lang="pt-br"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Borda de Melancia</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0; /* Correção: Removi as margens padrão do body para não criar barras de rolagem */
            
            background-color: #fdfdfd; /* Uma cor de fundo clara, para contrastar */
            
            /* Correção do erro de digitação: Era 'front-family', agora 'font-family' */
            font-family: Arial, sans-serif;
        }

        h1 {
            /* Mudei a cor do texto para combinar com a melancia */
            color: #d11e1e; 
            
            /* Correção: Defini o tamanho da fonte (3 vezes o padrão, como você pediu) */
            font-size: 3em; 

            /* --- O "Pulo do Gato": border-image --- */
            
            /* 1. Definimos a espessura e dizemos que a borda base é transparente */
            /* Eu usei 80px para ficar visível, 100px era muito agressivo */
            border: 80px solid transparent; 

            /* 2. Definimos a imagem (coloquei o URL direto da imagem que você enviou) */
            border-image-source: url('https://img.elo7.com.br/product/original/2CD45F1/papel-de-parede-adesivo-frutas-melancia-amostra-a4-decoracao-cozinha.jpg');

            /* 3. Dizemos como fatiar. Como é um padrão, '30' é um valor bom */
            border-image-slice: 30;

            /* 4. Fazemos a imagem se repetir de forma arredondada */
            border-image-repeat: round; 

            /* --- Ajuste de Padding --- */
            /* Correção: Você tinha dois padding, o navegador usa só o último. 
               Usei um padding menor para o texto não ficar muito longe da borda. */
            padding: 30px 60px;
        }
    </style>
</head>
<body>
    <h1>Hello World</h1>
</body>
</html>
