<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        body {
            /* Ativar o flebox para o alinhamento */
            display: flex;

            /* Centraliza horizontalmente o conteúdo */
            justify-content: center;
             
             /* Centraliza verticalmente o conteúdo */
            align-items: center;

            /* Define a altura como 100% da altura da tela */
            height: 100vh;

            /* Cor de fundo  */
            background-color: #f2f60f;
            /* Define a fonte do texto */
             font-family:Arial, sans-serif;

             h1{
             /* Cor da fonte */
                color:#f2f60f;
             /* Tamanho da fonte (3 vezes o tamanho padrão) */
               font-size: 70px;


             /* Barra ao redor do texto  */
                border:50px solid #080808;

             /* Cria espaço dentro do elemento (entre a borda e o texto). */
                padding: 150px;
            
            /* Espaçamento interno (topo/baixo = 20px, Lados = 40px) */
            padding 20px 40px;

            /* Arredondamento das bordas */
             border-radius: 100%;

            /* Fundo branco para destacar o texto */
            background-color: #080808
             }
        }
    </style>
</head>
<body>
    <!-- Texto exibido no navegador -->
    <h1>  Hello world</h1>
</body>
</html>
